services:
  world-downloader:
    build: .
    image: minecraft-world-downloader
    container_name: minecraft-world-downloader
    restart: unless-stopped
    ports:
      - "8080:8080"      # web management console -> http://localhost:8080
      - "25565:25565"    # Minecraft proxy -> point your client at localhost:25565
    environment:
      WEB_PORT: "8080"
      # The console has NO login by default. To gate it behind a username/password
      # (recommended if you expose it beyond localhost), set both of these:
      # WEB_USERNAME: "admin"
      # WEB_PASSWORD: "change-me"
      # SECRET_KEY: "set-a-long-random-string"   # only used when login is enabled
      #
      # ---- Preconfigure the downloader from compose (optional) --------------------------
      # Every console option is settable here as MWD_<UPPER_SNAKE_KEY>; these WIN over the
      # saved console config, so a value set here is authoritative for a headless deploy.
      # MWD_SERVER: "mc.example.net"          # remote server to download from (required to autostart)
      # MWD_WORLD_OUTPUT_DIR: "world"         # world folder under /data
      # MWD_EXTENDED_RENDER_DISTANCE: "0"     # any option works: MWD_<UPPER_SNAKE_KEY>
      #
      # ---- Unattended start ------------------------------------------------------------
      # MWD_AUTOSTART: "true"                 # start downloading on boot (needs an account signed in)
      # An account is required for online-mode servers. Sign in ONCE in the console with
      # Microsoft (device-code) — it persists in ./data/auth.json and autostart works on every
      # restart after that. For offline/cracked servers you can seed an account from env:
      # MWD_OFFLINE_USERNAME: "Steve"         # offline-mode username (no token)
      # MWD_MC_TOKEN: "<minecraft-access-token>"   # or a pre-obtained token (username looked up for you)
      #
      # ---- Microsoft OAuth client (optional) -------------------------------------------
      # MS_CLIENT_ID: "00000000402b5328"      # override the device-code client id if you use your own
    volumes:
      - ./data:/data     # downloaded worlds, registry cache, account session (auth.json), settings

  # Optional: render the downloaded world into an interactive 3D web map with BlueMap.
  # Enable with:  docker compose --profile bluemap up -d bluemap
  # Renders ./data/world, then serves the map at http://localhost:8100.
  bluemap:
    build:
      context: .
      dockerfile: bluemap/Dockerfile
    image: minecraft-world-downloader-bluemap
    container_name: minecraft-world-downloader-bluemap
    profiles: ["bluemap"]
    restart: unless-stopped
    ports:
      - "8100:8100"      # BlueMap 3D web map -> http://localhost:8100
    environment:
      WORLD_DIR: "/data/world"     # the downloaded world to render
      BLUEMAP_PORT: "8100"
    volumes:
      - ./data:/data
