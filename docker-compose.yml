services:
  world-downloader:
    build: .
    image: minecraft-world-downloader
    container_name: minecraft-world-downloader
    restart: unless-stopped
    ports:
      - "8080:8080"      # web management console -> http://localhost:8080
      - "25565:25565"    # Minecraft proxy -> point your client at localhost:25565
    environment:
      WEB_PORT: "8080"
      # The console has NO login by default. To gate it behind a username/password
      # (recommended if you expose it beyond localhost), set both of these:
      # WEB_USERNAME: "admin"
      # WEB_PASSWORD: "change-me"
      # SECRET_KEY: "set-a-long-random-string"   # only used when login is enabled
    volumes:
      - ./data:/data     # downloaded worlds, registry cache, and saved manager settings

  # Optional: render the downloaded world into an interactive 3D web map with BlueMap.
  # Enable with:  docker compose --profile bluemap up -d bluemap
  # Renders ./data/world, then serves the map at http://localhost:8100.
  bluemap:
    build:
      context: .
      dockerfile: bluemap/Dockerfile
    image: minecraft-world-downloader-bluemap
    container_name: minecraft-world-downloader-bluemap
    profiles: ["bluemap"]
    restart: unless-stopped
    ports:
      - "8100:8100"      # BlueMap 3D web map -> http://localhost:8100
    environment:
      WORLD_DIR: "/data/world"     # the downloaded world to render
      BLUEMAP_PORT: "8100"
    volumes:
      - ./data:/data
