name: All-in-one release

# Builds the downloader jar AND the desktop manager, bundles the jar + docker-compose + full
# source into the NSIS installer, and publishes a GitHub release (installer + jar + source zip)
# on every push to main and on manual dispatch.

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---- downloader jar (JDK 21) ----
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build downloader jar
        run: mvn -B -ntp clean package -DskipTests

      # ---- desktop manager (self-contained win-x64) ----
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: '"version=1.0.${{ github.run_number }}" >> $env:GITHUB_OUTPUT'

      - name: Publish desktop app
        shell: pwsh
        run: >
          dotnet publish desktop/WorldDownloaderManager.csproj
          -c Release -r win-x64 --self-contained true
          -o "${{ github.workspace }}\publish"

      # ---- bundle the jar + compose + full source INTO the installer payload ----
      - name: Bundle extras into installer payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "publish\resources" | Out-Null
          Copy-Item "target\world-downloader.jar" "publish\resources\world-downloader.jar"
          if (Test-Path "docker-compose.yml") { Copy-Item "docker-compose.yml" "publish\resources\docker-compose.yml" }
          git archive --format=zip -o "publish\resources\source.zip" HEAD

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $exe = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $exe)) { $exe = "$env:ProgramFiles\NSIS\makensis.exe" }
          & $exe `
            "/DAPP_VERSION=${{ steps.ver.outputs.version }}" `
            "/DSRC_DIR=${{ github.workspace }}\publish" `
            "/DOUT_FILE=${{ github.workspace }}\WorldDownloaderManager-Setup.exe" `
            "installer\installer.nsi"
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }

      # ---- standalone release assets (jar + source zip alongside the installer) ----
      - name: Stage release assets
        shell: pwsh
        run: |
          Copy-Item "target\world-downloader.jar" "world-downloader.jar"
          git archive --format=zip -o "source.zip" HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: all-in-one-${{ steps.ver.outputs.version }}
          path: |
            WorldDownloaderManager-Setup.exe
            world-downloader.jar
            source.zip

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: All-in-one build ${{ steps.ver.outputs.version }}
          body: |
            Automated all-in-one build.
            - **WorldDownloaderManager-Setup.exe** — desktop manager installer (bundles the jar,
              docker-compose.yml and full source under the install dir's `resources/` folder).
            - **world-downloader.jar** — the proxy/downloader jar (run with `java -jar`).
            - **source.zip** — full source snapshot.
          files: |
            WorldDownloaderManager-Setup.exe
            world-downloader.jar
            source.zip
