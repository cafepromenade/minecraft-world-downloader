name: Publish Docker image

# Builds the web-console image and pushes it to GHCR so the desktop manager
# (and `docker run`) can pull ghcr.io/<owner>/<repo>-web:latest.
# NOTE: the package name carries a "-web" suffix. It is a fresh package created by THIS repo's
# Actions, so the GITHUB_TOKEN auto-inherits write access (no manual package-permission grant needed,
# unlike the legacy ...-downloader package whose ACL blocked GITHUB_TOKEN pushes).

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
    paths:
      - 'src/**'
      - 'web/**'
      - 'scraper/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/docker-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Lower-case image name
        id: img
        # "-web" makes this a distinct, repo-owned package so GITHUB_TOKEN can publish it.
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-web" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
