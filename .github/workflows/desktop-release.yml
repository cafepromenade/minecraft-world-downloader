name: Desktop manager release

# Builds the WinUI 3 manager app (self-contained, unpackaged) and packages it
# with NSIS. On a version tag the installer is attached to a GitHub release.

on:
  push:
    tags:
      - 'v*'
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^(desktop-)?v',''
          if ([string]::IsNullOrWhiteSpace($v) -or $v -notmatch '^\d') { $v = "1.0.0" }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish (self-contained, win-x64)
        id: publish
        continue-on-error: true
        shell: pwsh
        run: >
          dotnet publish desktop/WorldDownloaderManager.csproj
          -c Release -r win-x64 --self-contained true
          -p:Platform=x64
          -p:WindowsPackageType=None
          -p:WindowsAppSDKSelfContained=true
          -o "${{ github.workspace }}\publish"

      - name: Diagnose XAML compiler (only if publish failed)
        if: steps.publish.outcome == 'failure'
        shell: pwsh
        run: |
          $inp = Get-ChildItem desktop\obj -Recurse -Filter input.json -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $inp) { "No input.json found."; exit 0 }
          "input.json: $($inp.FullName)"
          $xc = Get-ChildItem "$env:USERPROFILE\.nuget\packages\microsoft.windowsappsdk" -Recurse -Filter XamlCompiler.exe -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match 'net472' } | Select-Object -First 1
          "XamlCompiler: $($xc.FullName)"
          $out = Join-Path $inp.DirectoryName "diag_output.json"
          & $xc.FullName $inp.FullName $out 2>&1 | ForEach-Object { "XC> $_" }
          "=== XamlCompiler exit: $LASTEXITCODE ==="
          "=== output.json ==="; Get-Content $out -Raw -ErrorAction SilentlyContinue
          "=== GenXbf.dll present ==="
          Get-ChildItem "$env:USERPROFILE\.nuget\packages" -Recurse -Filter GenXbf.dll -ErrorAction SilentlyContinue |
            ForEach-Object { $_.FullName }

      - name: Fail if publish failed
        if: steps.publish.outcome == 'failure'
        run: exit 1
        shell: pwsh

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        run: >
          makensis
          "/DAPP_VERSION=${{ steps.ver.outputs.version }}"
          "/DSRC_DIR=${{ github.workspace }}\publish"
          "/DOUT_FILE=${{ github.workspace }}\WorldDownloaderManager-Setup.exe"
          installer\installer.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: WorldDownloaderManager-Setup
          path: WorldDownloaderManager-Setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: WorldDownloaderManager-Setup.exe
