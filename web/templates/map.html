<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>World Downloader &middot; Map</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        #mapCanvas { display: block; width: 100vw; height: 100vh; background: #0d1117; cursor: grab; }
        #mapCanvas.dragging { cursor: grabbing; }
        .map-topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; gap: 12px; padding: 10px 16px;
            background: linear-gradient(180deg, rgba(13,17,23,.92), rgba(13,17,23,0));
            pointer-events: none;
        }
        .map-topbar > * { pointer-events: auto; }
        .map-controls {
            position: fixed; bottom: 16px; left: 16px; z-index: 10;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-start;
        }
        .map-card {
            background: rgba(22,27,34,.92); border: 1px solid var(--outline);
            border-radius: 12px; padding: 8px 12px; box-shadow: var(--shadow-2);
            display: flex; align-items: center; gap: 8px;
        }
        .map-readout {
            position: fixed; bottom: 16px; right: 16px; z-index: 10;
            font-family: 'Roboto Mono', monospace; font-size: 13px;
        }
        .seg { display: inline-flex; border: 1px solid var(--outline); border-radius: 10px; overflow: hidden; }
        .seg button { border: 0; background: var(--surface-2); color: var(--text); padding: 6px 12px; cursor: pointer; font-size: 13px; }
        .seg button.active { background: var(--primary); color: var(--on-primary); font-weight: 600; }
        select.map-select { background: var(--surface-2); color: var(--text); border: 1px solid var(--outline); border-radius: 10px; padding: 6px 10px; }
        .icon-btn { width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
            background: var(--surface-2); color: var(--text); border: 1px solid var(--outline); border-radius: 10px; cursor: pointer; font-size: 20px; }
        .icon-btn.active { background: var(--primary); color: var(--on-primary); }
        .map-empty {
            position: fixed; inset: 0; z-index: 5; display: flex; align-items: center; justify-content: center;
            color: var(--muted); text-align: center; pointer-events: none;
        }
    </style>
</head>
<body>
<canvas id="mapCanvas"></canvas>

<div class="map-topbar">
    <a class="btn small" href="{{ url_for('index') }}"><span class="material-symbols-rounded">arrow_back</span> Console</a>
    <div class="map-card">
        <span class="material-symbols-rounded">public</span>
        <select id="dimSelect" class="map-select" title="Dimension"></select>
    </div>
    <div class="map-card">
        <div class="seg" id="modeSeg">
            <button data-mode="normal" class="active">Surface</button>
            <button data-mode="caves">Caves</button>
        </div>
    </div>
    <span class="badge stopped" id="liveBadge"><span class="dot"></span> waiting for tiles…</span>
</div>

<div class="map-controls">
    <div class="map-card" style="gap:4px">
        <button class="icon-btn" id="zoomIn" title="Zoom in">add</button>
        <button class="icon-btn" id="zoomOut" title="Zoom out">remove</button>
        <button class="icon-btn" id="resetBtn" title="Reset view">center_focus_weak</button>
        <button class="icon-btn active" id="followBtn" title="Follow player">my_location</button>
    </div>
</div>
<div class="map-readout map-card"><span id="coordReadout">x —, z —</span></div>
<div class="map-empty" id="emptyMsg">No map tiles yet. Start the downloader and explore the world —
    tiles render automatically (headless rendering must be enabled; it is by default).</div>

<script>
const ICONS = {add:'add', remove:'remove', center_focus_weak:'center_focus_weak', my_location:'my_location'};
// material-symbols are font-ligature based; set the icon buttons' text to the ligature
for (const b of document.querySelectorAll('.icon-btn')) { b.classList.add('material-symbols-rounded'); }

const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

const state = {
    meta: null,
    dim: null,
    mode: 'normal',
    scale: 1,                 // pixels per block
    camX: 0, camZ: 0,         // world block coords at screen center
    follow: true,
    version: 0,               // meta.updated, used to cache-bust tiles
    tiles: new Map(),         // key "rx,rz" -> {img, ver, ok}
    dragging: false,
    lastX: 0, lastZ: 0,
};

const REGION = 512;           // blocks per region tile

function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
}
window.addEventListener('resize', resize);

function worldToScreen(wx, wz) {
    return {
        x: (wx - state.camX) * state.scale + window.innerWidth / 2,
        y: (wz - state.camZ) * state.scale + window.innerHeight / 2,
    };
}
function screenToWorld(sx, sz) {
    return {
        x: (sx - window.innerWidth / 2) / state.scale + state.camX,
        z: (sz - window.innerHeight / 2) / state.scale + state.camZ,
    };
}

function currentTileList() {
    if (!state.meta || !state.meta.tiles || !state.dim) return [];
    const byDim = state.meta.tiles[state.dim];
    if (!byDim) return [];
    return byDim[state.mode] || [];
}

function tileKey(rx, rz) { return rx + ',' + rz; }

function tileUrl(rx, rz) {
    return `{{ url_for('map_tile', dim='__DIM__', mode='__MODE__', rx=0, rz=0) }}`
        .replace('__DIM__', encodeURIComponent(state.dim))
        .replace('__MODE__', state.mode)
        .replace('/0/0.png', `/${rx}/${rz}.png`) + '?v=' + state.version;
}

function getTile(rx, rz) {
    const key = tileKey(rx, rz);
    let t = state.tiles.get(key);
    if (t && t.ver === state.version) return t;
    const img = new Image();
    t = { img, ver: state.version, ok: false };
    img.onload = () => { t.ok = true; draw(); };
    img.onerror = () => { t.ok = false; };
    img.src = tileUrl(rx, rz);
    state.tiles.set(key, t);
    return t;
}

function draw() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    const list = currentTileList();
    const have = new Set(list.map(([rx, rz]) => tileKey(rx, rz)));
    document.getElementById('emptyMsg').style.display = list.length ? 'none' : 'flex';

    // viewport in world coords (with a margin)
    const tl = screenToWorld(0, 0);
    const br = screenToWorld(window.innerWidth, window.innerHeight);
    const minRX = Math.floor(tl.x / REGION) - 1, maxRX = Math.floor(br.x / REGION) + 1;
    const minRZ = Math.floor(tl.z / REGION) - 1, maxRZ = Math.floor(br.z / REGION) + 1;

    const sizePx = REGION * state.scale;
    for (let rx = minRX; rx <= maxRX; rx++) {
        for (let rz = minRZ; rz <= maxRZ; rz++) {
            if (!have.has(tileKey(rx, rz))) continue;
            const t = getTile(rx, rz);
            if (!t.ok) continue;
            const p = worldToScreen(rx * REGION, rz * REGION);
            ctx.imageSmoothingEnabled = state.scale < 1;
            ctx.drawImage(t.img, p.x, p.y, sizePx, sizePx);
        }
    }

    // player marker
    const player = state.meta && state.meta.player;
    if (player && state.dim === state.meta.currentDimension) {
        const p = worldToScreen(player.x, player.z);
        ctx.save();
        ctx.fillStyle = '#3ddc84';
        ctx.strokeStyle = '#052213';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
    }
}

// ---- interaction --------------------------------------------------------------------
canvas.addEventListener('mousedown', (e) => {
    state.dragging = true;
    state.follow = false;
    document.getElementById('followBtn').classList.remove('active');
    canvas.classList.add('dragging');
    state.lastX = e.clientX; state.lastZ = e.clientY;
});
window.addEventListener('mouseup', () => { state.dragging = false; canvas.classList.remove('dragging'); });
window.addEventListener('mousemove', (e) => {
    const w = screenToWorld(e.clientX, e.clientY);
    document.getElementById('coordReadout').textContent = `x ${Math.floor(w.x)}, z ${Math.floor(w.z)}`;
    if (!state.dragging) return;
    state.camX -= (e.clientX - state.lastX) / state.scale;
    state.camZ -= (e.clientY - state.lastZ) / state.scale;
    state.lastX = e.clientX; state.lastZ = e.clientY;
    draw();
});
canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const before = screenToWorld(e.clientX, e.clientY);
    const factor = e.deltaY < 0 ? 1.2 : 1 / 1.2;
    state.scale = Math.min(8, Math.max(0.05, state.scale * factor));
    const after = screenToWorld(e.clientX, e.clientY);
    state.camX += before.x - after.x;
    state.camZ += before.z - after.z;
    draw();
}, { passive: false });

document.getElementById('zoomIn').onclick = () => { state.scale = Math.min(8, state.scale * 1.3); draw(); };
document.getElementById('zoomOut').onclick = () => { state.scale = Math.max(0.05, state.scale / 1.3); draw(); };
document.getElementById('resetBtn').onclick = () => { state.scale = 1; centerOnPlayerOrTiles(); };
document.getElementById('followBtn').onclick = () => {
    state.follow = !state.follow;
    document.getElementById('followBtn').classList.toggle('active', state.follow);
    if (state.follow) centerOnPlayer();
};
document.getElementById('modeSeg').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-mode]');
    if (!btn) return;
    state.mode = btn.dataset.mode;
    for (const b of document.querySelectorAll('#modeSeg button')) b.classList.toggle('active', b === btn);
    draw();
});
document.getElementById('dimSelect').addEventListener('change', (e) => {
    state.dim = e.target.value;
    centerOnPlayerOrTiles();
});

function centerOnPlayer() {
    const p = state.meta && state.meta.player;
    if (p && state.dim === state.meta.currentDimension) { state.camX = p.x; state.camZ = p.z; }
    draw();
}
function centerOnTiles() {
    const list = currentTileList();
    if (!list.length) { draw(); return; }
    let sx = 0, sz = 0;
    for (const [rx, rz] of list) { sx += rx * REGION + REGION / 2; sz += rz * REGION + REGION / 2; }
    state.camX = sx / list.length; state.camZ = sz / list.length;
    draw();
}
function centerOnPlayerOrTiles() {
    const p = state.meta && state.meta.player;
    if (p && state.dim === state.meta.currentDimension) centerOnPlayer();
    else centerOnTiles();
}

// ---- meta polling -------------------------------------------------------------------
function rebuildDimOptions() {
    const sel = document.getElementById('dimSelect');
    const dims = state.meta && state.meta.tiles ? Object.keys(state.meta.tiles) : [];
    const prev = state.dim;
    sel.innerHTML = '';
    for (const d of dims) {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d.replace(/^minecraft_/, '').replace(/_/g, ' ');
        sel.appendChild(opt);
    }
    if (dims.length && (!prev || !dims.includes(prev))) {
        state.dim = state.meta.currentDimension && dims.includes(state.meta.currentDimension)
            ? state.meta.currentDimension : dims[0];
    }
    sel.value = state.dim || '';
}

async function pollMeta(first) {
    try {
        const res = await fetch("{{ url_for('map_meta') }}", { cache: 'no-store' });
        const meta = await res.json();
        const changed = !state.meta || meta.updated !== state.meta.updated;
        state.meta = meta;
        if (meta.updated) state.version = meta.updated;
        rebuildDimOptions();

        const badge = document.getElementById('liveBadge');
        const total = countTiles(meta);
        if (total > 0) { badge.className = 'badge running'; badge.innerHTML = '<span class="dot"></span> live · ' + total + ' tiles'; }
        else { badge.className = 'badge stopped'; badge.innerHTML = '<span class="dot"></span> waiting for tiles…'; }

        if (first) centerOnPlayerOrTiles();
        else if (state.follow) centerOnPlayer();
        if (changed) draw();
    } catch (e) { /* keep last view */ }
}
function countTiles(meta) {
    let n = 0;
    if (meta && meta.tiles) for (const d of Object.values(meta.tiles)) for (const arr of Object.values(d)) n += arr.length;
    return n;
}

resize();
pollMeta(true);
setInterval(pollMeta, 3000);
</script>
</body>
</html>
