<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in &middot; World Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <form class="login-card" method="post" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
        <h1>⛏ World Downloader</h1>
        <p class="subtitle">Management console</p>
        {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
        <label>Username
            <input type="text" name="username" autocomplete="username" autofocus required>
        </label>
        <label>Password
            <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="btn primary">Sign in</button>
    </form>
</body>
</html>
